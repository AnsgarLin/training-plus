<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Training+</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efea;
  --txt:#1a1a1a;--txt2:#666;--txt3:#aaa;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --info-bg:#e8f0fe;--info-txt:#1a56db;
  --danger-bg:#fde8e8;--danger-txt:#c81e1e;
  --success-bg:#e3fae8;--success-txt:#057a55;
  --warn-bg:#fdf6e3;--warn-txt:#92400e;
  --radius:10px;--radius-lg:14px;--yt:#FF0000;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg2);color:var(--txt);font-size:15px;min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;}
.view{flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:52px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;z-index:10;}
.tb-back{font-size:14px;color:var(--txt2);cursor:pointer;white-space:nowrap;padding:4px 2px;}
.tb-title{flex:1;font-size:16px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tb-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-trash{cursor:pointer;display:flex;align-items:center;padding:4px;color:var(--txt2);}
.crumb{font-size:10px;color:var(--txt3);background:var(--bg2);padding:4px 14px;border-bottom:0.5px solid var(--border);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tabs{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px 0;font-size:13px;text-align:center;color:var(--txt2);cursor:pointer;}
.tab.on{color:var(--txt);font-weight:600;border-bottom:2.5px solid var(--txt);}
.sort-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.sort-label{font-size:11px;color:var(--txt2);}
.sort-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);color:var(--txt2);background:var(--bg);cursor:pointer;}
.sort-pill.on{background:var(--txt);color:var(--bg);border-color:var(--txt);}
.scroll-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s;}
.card:active{background:var(--bg2);}
.card-av{width:36px;height:36px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--info-txt);flex-shrink:0;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:600;color:var(--txt);}
.card-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.card-chev{font-size:16px;color:var(--txt3);}
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius-lg);}
.trash-card-btn{width:30px;height:30px;border-radius:8px;background:var(--danger-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.btn-filled{height:46px;border-radius:12px;background:var(--txt);color:var(--bg);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex-shrink:0;}
.btn-filled:active{opacity:0.85;}
.btn-outline{height:46px;border-radius:12px;border:0.5px solid var(--border2);background:var(--bg);color:var(--txt);font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex-shrink:0;}
.btn-outline:active{background:var(--bg2);}
.btn-share{height:44px;border:0.5px solid var(--border2);border-radius:12px;background:var(--bg);color:var(--txt);font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;flex-shrink:0;}
.btn-share:active{background:var(--bg2);}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;}
.chip-save{background:var(--success-bg);color:var(--success-txt);}
.chip-saving{background:var(--warn-bg);color:var(--warn-txt);}
.chip-err{background:var(--danger-bg);color:var(--danger-txt);}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;min-height:200px;}
.empty-ring{width:52px;height:52px;border-radius:50%;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--txt3);}
.empty-txt{font-size:13px;color:var(--txt3);text-align:center;line-height:1.6;}
.user-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);cursor:pointer;}
.user-av{width:24px;height:24px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--info-txt);overflow:hidden;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.form-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;padding-bottom:20px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:var(--txt2);}
.fi{width:100%;height:38px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg);padding:0 10px;font-size:14px;color:var(--txt);outline:none;}
.fi:focus{border-color:var(--txt);}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.ta-drop{border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);overflow:hidden;margin-top:-8px;}
.ta-item{padding:9px 10px;font-size:13px;color:var(--txt2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ta-item:last-child{border-bottom:none;}
.ta-item:active{background:var(--bg3);}
.sec-label{font-size:11px;font-weight:600;color:var(--txt2);margin-top:4px;}
.action-list-box{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.al-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--border);background:var(--bg);cursor:pointer;}
.al-row:last-child{border-bottom:none;}
.al-info{flex:1;min-width:0;}
.al-name{font-size:13px;font-weight:600;}
.al-det{font-size:11px;color:var(--txt2);margin-top:1px;}
.al-rm{font-size:18px;color:var(--txt3);cursor:pointer;padding:0 4px;}
.add-action-btn{height:36px;border:0.5px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt3);cursor:pointer;background:var(--bg2);}
.save-btn{height:46px;border-radius:10px;background:var(--txt);color:var(--bg);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.vid-empty{border:1.5px dashed var(--border2);border-radius:10px;height:44px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg2);width:100%;}
.vid-empty:active{background:var(--bg3);}
.vid-opts{border:0.5px solid var(--border);border-radius:10px;overflow:hidden;}
.vid-opt{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:0.5px solid var(--border);cursor:pointer;background:var(--bg);}
.vid-opt:last-child{border-bottom:none;}
.vid-opt:active{background:var(--bg2);}
.vid-opt-icon{width:28px;height:28px;border-radius:7px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vid-opt-t{font-size:13px;font-weight:500;}
.vid-opt-s{font-size:10px;color:var(--txt2);}
.vid-url{font-size:11px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vid-rm{font-size:11px;color:var(--danger-txt);cursor:pointer;white-space:nowrap;}
.vid-autofill{background:var(--info-bg);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
.vid-af-txt{flex:1;font-size:11px;color:var(--info-txt);}
.vid-af-chg{font-size:11px;color:var(--txt2);cursor:pointer;}
.yt-preview-wrap{width:100%;border-radius:10px;overflow:hidden;background:#000;}
.yt-preview-thumb{position:relative;width:100%;aspect-ratio:16/9;cursor:pointer;border-radius:10px;overflow:hidden;}
.yt-preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);}
.yt-preview-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;}
.yt-preview-triangle{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid #fff;margin-left:4px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;z-index:200;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.25s;}
.toast.show{opacity:1;}
.confirm-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;z-index:60;}
.confirm-box{background:var(--bg);border-radius:14px 14px 0 0;padding:20px 16px 28px;width:100%;}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.confirm-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;flex-wrap:wrap;}
.confirm-cancel{flex:1;height:44px;border:0.5px solid var(--border2);border-radius:10px;font-size:14px;cursor:pointer;background:var(--bg);font-weight:500;}
.confirm-del{flex:1;height:44px;border:none;border-radius:10px;font-size:14px;cursor:pointer;background:var(--danger-bg);color:var(--danger-txt);font-weight:600;}
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 24px;}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt2);font-size:14px;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--txt);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.import-opt{display:flex;align-items:center;gap:12px;padding:14px;border:0.5px solid var(--border);border-radius:12px;cursor:pointer;background:var(--bg);margin-bottom:0;}
.import-opt:active{background:var(--bg2);}
.import-opt-icon{width:40px;height:40px;border-radius:10px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#qr-file-input{display:none;}
.prev-block{background:var(--bg2);border-radius:var(--radius-lg);padding:14px;display:flex;flex-direction:column;gap:0;}
.prev-set{font-size:13px;font-weight:600;color:var(--txt);padding:3px 0;margin-top:6px;}
.prev-set:first-child{margin-top:0;}
.prev-act{font-size:12px;color:var(--txt2);padding:2px 0 2px 12px;line-height:1.5;}
.prev-actions{display:flex;gap:8px;}
.prev-btn{flex:1;height:42px;border:0.5px solid var(--border2);border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;font-weight:500;color:var(--txt);cursor:pointer;}
.prev-btn:active{background:var(--bg2);}
.sel-box{display:flex;flex-direction:column;gap:6px;}
.sel-hint{font-size:11px;color:var(--txt3);}
.sel-text{width:100%;min-height:100px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);padding:8px 10px;font-size:11px;font-family:monospace;color:var(--txt2);resize:none;outline:none;line-height:1.7;}
</style>
</head>
<body>
<div id="app"><div id="view-root"></div></div>
<div id="toast" class="toast"></div>
<input type="file" id="qr-file-input" accept="image/*"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://apis.google.com/js/api.js" async></script>
<script>
var CLIENT_ID='304684962808-2uqcl5ktktprgdb1aj1nftgci0pbgqbb.apps.googleusercontent.com';
var SCOPES='https://www.googleapis.com/auth/drive.file';
var FOLDER_NAME='Training+';
var DELETED_FOLDER='deleted';
var BANK_FILE='action_bank.json';

var S={
  gapiReady:false,gisReady:false,
  user:null,accessToken:null,tokenClient:null,
  rootFolderId:null,deletedFolderId:null,
  studentFiles:[],deletedFiles:[],
  actionBank:[],bankFileId:null,
  currentData:null,currentFileId:null,
  view:'auth',sort:'az',studentTab:'active',
  deleteMode:false,
  importView:null,importText:'',importParsed:null,importError:'',importImageSrc:null,
  showQR:false,
  currentStudentName:null,currentDayId:null,currentSetId:null,
  editingSet:null,editingAction:null,
  showVidOpts:false,showInsertLink:false,
  saveStatus:'saved',syncMsg:'',
  showConfirm:null,errorBanner:''
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
function avatarColors(n){var c=[['#e8f0fe','#1a56db'],['#e3fae8','#057a55'],['#fdf6e3','#92400e'],['#f3e8ff','#6b21a8'],['#fce7f3','#9d174d']];var hh=0;for(var i=0;i<n.length;i++)hh+=n.charCodeAt(i);return c[hh%c.length];}
function initials(n){return n.split(' ').map(function(w){return w[0];}).join('').slice(0,2).toUpperCase();}
function ytIcon(w,h){w=w||22;h=h||15;return '<svg width="'+w+'" height="'+h+'" viewBox="0 0 20 14"><rect width="20" height="14" rx="3" fill="#FF0000"/><polygon points="8,3 8,11 15,7" fill="white"/></svg>';}
function shortUrl(u){return(u||'').replace(/https?:\/\//,'');}
function ytVideoId(url){if(!url)return null;var m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);return m?m[1]:null;}
function trashSvg(w,color){w=w||17;color=color||'currentColor';return '<svg width="'+w+'" height="'+w+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>';}
function chipHtml(){
  if(S.saveStatus==='saving')return '<span class="chip chip-saving">Saving\u2026</span>';
  if(S.saveStatus==='error')return '<span class="chip chip-err" id="retry-save">&#9888; Retry</span>';
  return '<span class="chip chip-save">Saved \u2713</span>';
}
function userPillHtml(){
  if(!S.user)return '';
  var av=S.user.picture?'<div class="user-av"><img src="'+S.user.picture+'"/></div>':'<div class="user-av">'+initials(S.user.name||'U')+'</div>';
  return '<div class="user-pill" id="sign-out-btn">'+av+'<span>'+((S.user.name||'').split(' ')[0])+'</span></div>';
}
function updateChip(){
  document.querySelectorAll('.chip').forEach(function(el){
    if(S.saveStatus==='saving'){el.className='chip chip-saving';el.textContent='Saving\u2026';}
    else if(S.saveStatus==='error'){el.className='chip chip-err';el.id='retry-save';el.textContent='\u26a0 Retry';}
    else{el.className='chip chip-save';el.textContent='Saved \u2713';}
  });
}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function waitFor(check,cb){if(check())cb();else setTimeout(function(){waitFor(check,cb);},200);}
function initGapi(){
  gapi.load('client',function(){
    gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']}).then(function(){S.gapiReady=true;});
  });
}
function initGis(){
  S.tokenClient=google.accounts.oauth2.initTokenClient({
    client_id:CLIENT_ID,scope:SCOPES,
    callback:function(r){
      if(r.error){S.errorBanner='Sign-in failed: '+r.error;render();return;}
      S.accessToken=r.access_token;
      gapi.client.setToken({access_token:r.access_token});
      loadUserInfo().then(function(){return bootstrap();}).then(function(){startSyncInterval();});
    }
  });
  S.gisReady=true;
}
function loadUserInfo(){
  return gapi.client.request({path:'https://www.googleapis.com/oauth2/v2/userinfo'}).then(function(r){S.user=r.result;}).catch(function(){S.user={name:'User',email:'',picture:''};});
}
function signIn(){
  if(!S.gapiReady||!S.gisReady){toast('Still loading, please try again.');return;}
  S.tokenClient.requestAccessToken({prompt:''});
}
function signOut(){
  stopSyncInterval();
  if(S.accessToken)google.accounts.oauth2.revoke(S.accessToken);
  S.accessToken=null;S.user=null;S.currentData=null;
  S.rootFolderId=null;S.studentFiles=[];
  lastSavedSnapshot=null;S.view='auth';render();
}

// ── DRIVE ─────────────────────────────────────────────────────────────────────
function driveList(q){return gapi.client.drive.files.list({q:q,fields:'files(id,name,modifiedTime)',spaces:'drive',pageSize:200}).then(function(r){return r.result.files||[];});}
function driveCreateFolder(name,parentId){return gapi.client.drive.files.create({resource:{name:name,mimeType:'application/vnd.google-apps.folder',parents:parentId?[parentId]:[]},fields:'id'}).then(function(r){return r.result.id;});}
function driveRead(fileId){return gapi.client.request({path:'https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media'}).then(function(r){return typeof r.result==='string'?JSON.parse(r.result):r.result;});}
function driveWrite(fileId,data,attempt){
  attempt=attempt||1;
  return fetch('https://www.googleapis.com/upload/drive/v3/files/'+fileId+'?uploadType=media',{method:'PATCH',headers:{'Authorization':'Bearer '+S.accessToken,'Content-Type':'application/json; charset=UTF-8'},body:JSON.stringify(data)}).then(function(resp){
    if(resp.status===503||resp.status===500||resp.status===429){
      if(attempt<=4){
        var delay=Math.min(1000*Math.pow(2,attempt-1),8000);
        return new Promise(function(resolve){setTimeout(resolve,delay);}).then(function(){return driveWrite(fileId,data,attempt+1);});
      }
      return resp.text().then(function(e){throw new Error('Drive write '+resp.status+': '+e);});
    }
    if(!resp.ok)return resp.text().then(function(e){throw new Error('Drive write '+resp.status+': '+e);});
  });
}
function driveCreate(name,parentId,data){
  return gapi.client.drive.files.create({resource:{name:name,mimeType:'application/json',parents:[parentId]},fields:'id'}).then(function(m){
    var id=m.result.id;return driveWrite(id,data).then(function(){return id;});
  });
}
function driveMove(fileId,from,to){return gapi.client.drive.files.update({fileId:fileId,addParents:to,removeParents:from,fields:'id'});}
function driveDelete(fileId){return gapi.client.drive.files.delete({fileId:fileId});}

// ── SYNC ──────────────────────────────────────────────────────────────────────
var lastSavedSnapshot=null;
var syncInterval=null;
function snapshotKey(){return JSON.stringify({data:S.currentData,bank:S.actionBank});}
function startSyncInterval(){
  stopSyncInterval();
  syncInterval=setInterval(function(){
    if(!S.currentFileId||!S.currentData)return;
    if(S.view==='setEdit'||S.view==='actionEdit')commitSet();
    if(snapshotKey()===lastSavedSnapshot)return;
    forceSave();
  },500);
}
function stopSyncInterval(){if(syncInterval){clearInterval(syncInterval);syncInterval=null;}}
function forceSave(){
  if(!S.currentFileId||!S.currentData)return Promise.resolve();
  var snap=JSON.parse(JSON.stringify(S.currentData));
  var bank=JSON.parse(JSON.stringify(S.actionBank));
  var key=snapshotKey();
  S.saveStatus='saving';updateChip();
  return driveWrite(S.currentFileId,snap).then(function(){
    return driveWrite(S.bankFileId,bank);
  }).then(function(){
    lastSavedSnapshot=key;S.saveStatus='saved';updateChip();
  }).catch(function(e){
    console.error('save failed:',e);S.saveStatus='error';updateChip();
  });
}

// ── BOOTSTRAP ─────────────────────────────────────────────────────────────────
function bootstrap(){
  S.view='loading';S.syncMsg='Setting up Training+\u2026';render();
  return driveList("name='"+FOLDER_NAME+"' and mimeType='application/vnd.google-apps.folder' and trashed=false").then(function(f){
    return f.length>0?f[0].id:driveCreateFolder(FOLDER_NAME);
  }).then(function(id){
    S.rootFolderId=id;
    return driveList("name='"+DELETED_FOLDER+"' and '"+id+"' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false");
  }).then(function(df){
    return df.length>0?df[0].id:driveCreateFolder(DELETED_FOLDER,S.rootFolderId);
  }).then(function(did){
    S.deletedFolderId=did;
    return driveList("name='"+BANK_FILE+"' and '"+S.rootFolderId+"' in parents and trashed=false");
  }).then(function(bf){
    if(bf.length>0){S.bankFileId=bf[0].id;return driveRead(S.bankFileId).then(function(d){S.actionBank=d||[];});}
    S.actionBank=[];return driveCreate(BANK_FILE,S.rootFolderId,[]).then(function(id){S.bankFileId=id;});
  }).then(function(){return refreshStudentList();})
  .then(function(){S.view='students';render();})
  .catch(function(e){S.errorBanner='Setup failed: '+e.message;S.view='auth';render();});
}
function refreshStudentList(){

// ── IMPORT / QR ───────────────────────────────────────────────────────────────
function parseImportText(raw){
  if(!raw)return null;
  var lines=raw.trim().split('\n');
  var m=lines[0]&&lines[0].match(/^D(\d+)/i);
  if(!m)return null;
  var dayId=parseInt(m[1]);
  var sets=[];var curSet=null;
  for(var i=1;i<lines.length;i++){
    var l=lines[i];
    if(!l||!l.trim())continue;
    if(l.charAt(0)===' '||l.charAt(0)==='\t'){
      if(!curSet)continue;
      var parts=l.trim().split('|');
      var name=parts[0]?parts[0].trim():'Action';
      var reps='',duration='',weight='',note='',videoUrl='';
      for(var j=1;j<parts.length;j++){
        var p=parts[j].trim();
        if(p.indexOf('youtu')>=0)videoUrl=p.indexOf('http')===0?p:'https://'+p;
        else if(/^\d+\s*Rep/i.test(p))reps=p.replace(/\s*Reps?/i,'').trim();
        else if(/sec|min/i.test(p))duration=p;
        else if(/\d+(kg|lb)/i.test(p))weight=p;
        else if(!note)note=p;
      }
      curSet.actions.push({id:curSet.actions.length+1,name:name,reps:reps,duration:duration,weight:weight,note:note,videoUrl:videoUrl,deleted:false});
    }else{
      var sparts=l.split('|');
      var rm=sparts[0].match(/(\d+)\s*Sets?/i);
      var rounds=rm?parseInt(rm[1]):1;
      var rest='',snote='';
      for(var k=1;k<sparts.length;k++){
        var sp=sparts[k].trim();
        var rm2=sp.match(/rest\s*(\d+)/i);
        if(rm2)rest=rm2[1];
        else if(!snote)snote=sp;
      }
      curSet={id:sets.length+1,rounds:rounds,rest:rest,note:snote,actions:[],deleted:false};
      sets.push(curSet);
    }
  }
  if(!sets.length)return null;
  return{dayId:dayId,sets:sets};
}
function doImport(targetDayId,replace){
  var p=S.importParsed;
  if(!p||!S.currentData)return;
  if(!S.currentData.days)S.currentData.days=[];
  for(var i=0;i<p.sets.length;i++){
    for(var j=0;j<p.sets[i].actions.length;j++){
      var a=p.sets[i].actions[j];
      var b=null;
      for(var k=0;k<S.actionBank.length;k++){if(S.actionBank[k].name.toLowerCase()===a.name.toLowerCase()){b=S.actionBank[k];break;}}
      if(b){if(a.videoUrl)b.videoUrl=a.videoUrl;}
      else S.actionBank.push({name:a.name,videoUrl:a.videoUrl||''});
    }
  }
  var newDay={id:targetDayId,deleted:false,sets:p.sets};
  if(replace){
    var idx=-1;
    for(var x=0;x<S.currentData.days.length;x++){if(S.currentData.days[x].id===targetDayId){idx=x;break;}}
    if(idx>=0)S.currentData.days[idx]=newDay;else S.currentData.days.push(newDay);
  }else{S.currentData.days.push(newDay);}
  S.importView=null;S.importParsed=null;S.importText='';S.importError='';S.importImageSrc=null;
  S.view='days';render();
  toast('D'+targetDayId+' imported successfully');
}

function loadJsQR(cb){
  if(window.jsQR){cb(window.jsQR);return;}
  var s=document.createElement('script');
  s.src='https://unpkg.com/jsqr@1.4.0/dist/jsQR.js';
  s.onload=function(){cb(window.jsQR);};
  s.onerror=function(){
    var s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js';
    s2.onload=function(){cb(window.jsQR);};

}
var _scanInterval=null;var _scanStream=null;
function stopScanner(){
  if(_scanInterval){clearInterval(_scanInterval);_scanInterval=null;}
  if(_scanStream){_scanStream.getTracks().forEach(function(t){t.stop();});_scanStream=null;}
}
function startScanner(){
  loadJsQR(function(jsQR){
    navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(function(stream){
      _scanStream=stream;
      var video=document.getElementById('scan-video');
      var canvas=document.getElementById('scan-canvas');
      if(!video||!canvas)return;
      video.srcObject=stream;video.play();
      var ctx=canvas.getContext('2d');
      _scanInterval=setInterval(function(){
        if(video.readyState!==video.HAVE_ENOUGH_DATA)return;
        canvas.width=video.videoWidth;canvas.height=video.videoHeight;
        ctx.drawImage(video,0,0);
        var img=ctx.getImageData(0,0,canvas.width,canvas.height);
        var code=jsQR(img.data,img.width,img.height);
        if(code&&code.data){
          stopScanner();
          var parsed=parseImportText(code.data);
          if(parsed){S.importParsed=parsed;S.importText=code.data;S.importError='';S.importView='preview';}
          else{S.importError="Couldn't read QR code format.";}
          render();
        }
      },200);
    }).catch(function(){toast('Camera access denied');S.importView='choose';render();});
  });
}
function setupFileInput(){
  var fi=document.getElementById('qr-file-input');
  if(!fi)return;

function decodeQRFromImage(){
  var src=S.importImageSrc;
  if(!src){S.importError='No image loaded.';render();return;}
  toast('Scanning\u2026');
  loadJsQR(function(jsQR){
    var img=new Image();
    img.onload=function(){
      try{
        var MAX=1024;
        var scale=Math.min(1,MAX/Math.max(img.naturalWidth,img.naturalHeight));
        var w=Math.round(img.naturalWidth*scale)||img.naturalWidth;
        var h=Math.round(img.naturalHeight*scale)||img.naturalHeight;
        var canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        var px=canvas.getContext('2d').getImageData(0,0,w,h);
        var code=jsQR(px.data,px.width,px.height);
        if(code&&code.data){
          var parsed=parseImportText(code.data);
          if(parsed){stopScanner();S.importImageSrc=null;S.importParsed=parsed;S.importText=code.data;S.importError='';S.importView='preview';}
          else{S.importError="QR found but doesn't match Training+ format.";}
        }else{S.importError="No QR code detected. Try a clearer photo.";}
      }catch(err){S.importError="Decode error: "+err.message;}
      render();
    };
    img.onerror=function(){S.importError="Couldn't load image.";render();};
    img.src=src;
  });
}

function getDays(){return(S.currentData&&S.currentData.days?S.currentData.days:[]).filter(function(d){return !d.deleted;}).sort(function(a,b){return a.id-b.id;});}
function getSets(did){var days=S.currentData&&S.currentData.days?S.currentData.days:[];var day=null;for(var i=0;i<days.length;i++){if(days[i].id===did){day=days[i];break;}}return day&&day.sets?day.sets.filter(function(s){return !s.deleted;}):[];}
function maxDayId(){return(S.currentData&&S.currentData.days?S.currentData.days:[]).reduce(function(m,d){return Math.max(m,d.id);},0);}
function commitSet(){
  if(!S.editingSet||!S.currentData)return;
  if(!S.currentData.days)S.currentData.days=[];
  var day=null;
  for(var i=0;i<S.currentData.days.length;i++){if(S.currentData.days[i].id===S.currentDayId){day=S.currentData.days[i];break;}}
  if(!day){day={id:S.currentDayId,deleted:false,sets:[]};S.currentData.days.push(day);}
  if(!day.sets)day.sets=[];
  var toSave=JSON.parse(JSON.stringify(S.editingSet));
  if(toSave.id){
    var idx=-1;for(var j=0;j<day.sets.length;j++){if(day.sets[j].id===toSave.id){idx=j;break;}}
    if(idx>=0)day.sets[idx]=toSave;else day.sets.push(toSave);
  }else{
    toSave.id=day.sets.reduce(function(m,s){return Math.max(m,s.id||0);},0)+1;
    S.editingSet.id=toSave.id;day.sets.push(toSave);
  }
}
// Flush current DOM values + editingAction into editingSet, then commitSet
function syncActionToSet(){
  if(!S.editingAction||!S.editingSet)return;
  if(!S.editingSet.actions)S.editingSet.actions=[];
  var draft=JSON.parse(JSON.stringify(S.editingAction));
  var nameEl=document.getElementById('act-name');if(nameEl)draft.name=nameEl.value;
  var fmap={'act-reps':'reps','act-dur':'duration','act-weight':'weight','act-note':'note'};
  Object.keys(fmap).forEach(function(eid){var el=document.getElementById(eid);if(el)draft[fmap[eid]]=el.value;});
  if(!draft.name||!draft.name.trim())return;
  if(!draft.id){
    draft.id=S.editingSet.actions.reduce(function(m,a){return Math.max(m,a.id||0);},0)+1;
    S.editingAction.id=draft.id;
  }
  var idx=-1;
  for(var i=0;i<S.editingSet.actions.length;i++){if(S.editingSet.actions[i].id===draft.id){idx=i;break;}}
  if(idx>=0)S.editingSet.actions[idx]=draft;else S.editingSet.actions.push(draft);
  commitSet();
}
function buildPreview(dayId){
  var days=S.currentData&&S.currentData.days?S.currentData.days:[];
  var day=null;for(var i=0;i<days.length;i++){if(days[i].id===dayId){day=days[i];break;}}
  if(!day)return '';
  var lines=['D'+day.id];
  var sets=day.sets?day.sets.filter(function(s){return !s.deleted;}):[];
  for(var si=0;si<sets.length;si++){
    var set=sets[si];
    var sl=set.rounds+' Set'+(set.rounds>1?'s':'');
    if(set.rest)sl+=' | rest '+set.rest+' min';
    if(set.note)sl+=' | '+set.note;
    lines.push(sl);
    var acts=set.actions?set.actions.filter(function(a){return !a.deleted;}):[];
    for(var ai=0;ai<acts.length;ai++){
      var a=acts[ai];var al='  '+a.name;
      if(a.reps)al+=' | '+a.reps+' Reps';
      if(a.duration)al+=' | '+a.duration;
      if(a.weight)al+=' | '+a.weight;
      if(a.note)al+=' | '+a.note;
      if(a.videoUrl)al+=' | '+shortUrl(a.videoUrl);
      lines.push(al);
    }
    lines.push('');
  }
  return lines.join('\n').trim();
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function attachHandlers(){
  // Clone element before attaching listener — removes any previously attached listeners
  function on(id,fn){
    var el=document.getElementById(id);
    if(!el)return;
    var fresh=el.cloneNode(true);
    el.parentNode.replaceChild(fresh,el);
    fresh.addEventListener('click',fn);
  }
  function onAll(sel,fn){
    document.querySelectorAll(sel).forEach(function(el){
      var fresh=el.cloneNode(true);
      el.parentNode.replaceChild(fresh,el);
      fresh.addEventListener('click',fn);
    });
  }

  on('signin-btn',signIn);
  on('sign-out-btn',function(){if(confirm('Sign out?'))signOut();});
  on('retry-save',forceSave);
  onAll('[data-sort]',function(e){S.sort=e.currentTarget.dataset.sort;render();});
  onAll('[data-tab]',function(e){S.studentTab=e.currentTarget.dataset.tab;if(e.currentTarget.dataset.tab==='deleted'&&!S.deletedFiles.length){refreshDeletedList().then(function(){render();});return;}render();});
  on('enter-del-mode',function(){S.deleteMode=true;render();});
  on('exit-del-mode',function(){S.deleteMode=false;render();});
  onAll('[data-del-confirm]',function(e){e.stopPropagation();var el=e.currentTarget;S.showConfirm={type:el.dataset.delConfirm,id:el.dataset.id?parseInt(el.dataset.id):null,fileId:el.dataset.fileId||null,label:el.dataset.label};render();});
  on('conf-cancel',function(){S.showConfirm=null;render();});
  on('conf-bg',function(e){if(e.target.id==='conf-bg'){S.showConfirm=null;render();}});
  on('conf-ok',function(){
    var c=S.showConfirm;S.showConfirm=null;
    if(c.type==='student'){S.view='loading';S.syncMsg='Moving to deleted\u2026';render();driveMove(c.fileId,S.rootFolderId,S.deletedFolderId).then(function(){return refreshStudentList();}).then(function(){S.deleteMode=false;S.view='students';render();}).catch(function(e){toast('Error: '+e.message);S.view='students';render();});}
    else if(c.type==='day'){var days=S.currentData&&S.currentData.days?S.currentData.days:[];for(var i=0;i<days.length;i++){if(days[i].id===c.id){days[i].deleted=true;break;}}render();}
    else if(c.type==='set'){var day2=null;var days2=S.currentData&&S.currentData.days?S.currentData.days:[];for(var j=0;j<days2.length;j++){if(days2[j].id===S.currentDayId){day2=days2[j];break;}}if(day2&&day2.sets){for(var k=0;k<day2.sets.length;k++){if(day2.sets[k].id===c.id){day2.sets[k].deleted=true;break;}}}render();}
  });
  onAll('[data-restore]',function(e){S.showConfirm={type:'restore-or-delete',fileId:e.currentTarget.dataset.restore,label:e.currentTarget.dataset.name};render();});
  on('conf-restore',function(){var c=S.showConfirm;S.showConfirm=null;S.view='loading';S.syncMsg='Restoring\u2026';render();driveMove(c.fileId,S.deletedFolderId,S.rootFolderId).then(function(){return refreshDeletedList();}).then(function(){return refreshStudentList();}).then(function(){S.view='students';S.studentTab='active';render();}).catch(function(e){toast('Error: '+e.message);render();});});
  on('conf-perm-del',function(){var c=S.showConfirm;S.showConfirm=null;S.view='loading';S.syncMsg='Deleting\u2026';render();driveDelete(c.fileId).then(function(){return refreshDeletedList();}).then(function(){S.view='students';S.studentTab='deleted';render();}).catch(function(e){toast('Error: '+e.message);render();});});
  onAll('[data-load-student]',function(e){if(S.view!=='students')return;loadStudent(e.currentTarget.dataset.loadStudent,e.currentTarget.dataset.sname);});
  onAll('[data-nav-day]',function(e){if(S.view!=='days')return;S.currentDayId=parseInt(e.currentTarget.dataset.navDay);S.deleteMode=false;S.view='sets';render();});
  onAll('[data-nav-set]',function(e){if(S.view!=='sets')return;var sid=parseInt(e.currentTarget.dataset.navSet);var sets=getSets(S.currentDayId);var set=null;for(var i=0;i<sets.length;i++){if(sets[i].id===sid){set=sets[i];break;}}if(!set)return;S.currentSetId=sid;S.editingSet=JSON.parse(JSON.stringify(set));S.view='setEdit';render();});
  on('back-students',function(){S.deleteMode=false;S.view='loading';S.syncMsg='Syncing\u2026';render();refreshStudentList().then(function(){S.view='students';render();});});
  on('back-days',function(){S.deleteMode=false;S.view='days';render();});
  on('back-sets',function(){S.editingSet=null;S.deleteMode=false;S.view='sets';render();});
  on('back-set-edit',function(){S.editingAction=null;S.showInsertLink=false;S.showVidOpts=false;commitSet();S.view='setEdit';render();});
  on('back-sets-prev',function(){S.view='sets';render();});
  on('back-preview-from-qr',function(){S.view='preview';render();});
  on('add-student-btn',function(){var n=(prompt('Student name:','')||'').trim();if(!n)return;var name=n;while(S.studentFiles.some(function(s){return s.name.toLowerCase()===name.toLowerCase();})){var mm=name.match(/ (\d+)$/);name=mm?name.replace(/ \d+$/,' '+(parseInt(mm[1])+1)):name+' 2';}S.view='loading';S.syncMsg='Creating student\u2026';render();driveCreate(name+'.json',S.rootFolderId,{name:name,days:[]}).then(function(fid){S.currentData={name:name,days:[]};S.currentFileId=fid;S.currentStudentName=name;lastSavedSnapshot=snapshotKey();return refreshStudentList();}).then(function(){S.view='days';render();});});
  on('add-day-btn',function(){if(!S.currentData.days)S.currentData.days=[];var nid=maxDayId()+1;S.currentData.days.push({id:nid,deleted:false,sets:[]});S.currentDayId=nid;S.view='sets';render();});
  on('add-set-btn',function(){S.editingSet={id:null,rounds:1,rest:'',note:'',actions:[],deleted:false};S.view='setEdit';render();});
  on('share-day-btn',function(){S.view='preview';render();});
  // set field sync
  function syncSetFields(){if(!S.editingSet)return;var r=document.getElementById('set-rounds');var rs=document.getElementById('set-rest');var rn=document.getElementById('set-note');S.editingSet.rounds=r?parseInt(r.value)||1:S.editingSet.rounds;S.editingSet.rest=rs?rs.value:S.editingSet.rest;S.editingSet.note=rn?rn.value:S.editingSet.note;commitSet();}
  var sr=document.getElementById('set-rounds');if(sr)sr.addEventListener('change',syncSetFields);
  var srs=document.getElementById('set-rest');if(srs)srs.addEventListener('change',syncSetFields);
  var sn=document.getElementById('set-note');if(sn)sn.addEventListener('change',syncSetFields);
  // action list handlers — view-guarded so stale listeners don't fire
  onAll('[data-edit-act]',function(e){
    if(S.view!=='setEdit')return;
    if(e.target.closest('[data-rm-act]'))return;
    var id=parseInt(e.currentTarget.dataset.editAct);
    var acts=S.editingSet.actions||[];var a=null;
    for(var i=0;i<acts.length;i++){if(acts[i].id===id){a=acts[i];break;}}
    if(!a)return;
    S.editingAction=JSON.parse(JSON.stringify(a));S.editingAction._vidAutoFill=false;S.showVidOpts=false;S.showInsertLink=false;S.view='actionEdit';render();
  });
  onAll('[data-rm-act]',function(e){if(S.view!=='setEdit')return;e.stopPropagation();var id=parseInt(e.currentTarget.dataset.rmAct);var acts=S.editingSet&&S.editingSet.actions?S.editingSet.actions:[];for(var i=0;i<acts.length;i++){if(acts[i].id===id){acts[i].deleted=true;break;}}commitSet();render();});
  on('add-action-btn',function(){S.editingAction={id:null,name:'',reps:'',duration:'',weight:'',note:'',videoUrl:'',deleted:false};S.showVidOpts=false;S.showInsertLink=false;S.view='actionEdit';render();});
  // action edit field sync
  var an=document.getElementById('act-name');
  if(an){an.addEventListener('input',function(e){
    S.editingAction.name=e.target.value;S.editingAction._vidAutoFill=false;
    syncActionToSet();
    var q2=e.target.value.toLowerCase();var ms=[];for(var i=0;i<S.actionBank.length&&ms.length<5;i++){if(S.actionBank[i].name.toLowerCase().indexOf(q2)>=0)ms.push(S.actionBank[i]);}
    var ex=document.getElementById('ta-drop');if(ex)ex.remove();
    if(ms.length){var div=document.createElement('div');div.className='ta-drop';div.id='ta-drop';var inner='';for(var mi=0;mi<ms.length;mi++){var mm=ms[mi];inner+='<div class="ta-item" data-ta="'+encodeURIComponent(mm.name)+'" data-ta-vid="'+encodeURIComponent(mm.videoUrl||'')+'"><span>'+h(mm.name)+'</span>'+(mm.videoUrl?ytIcon(20,14):'')+'</div>';}div.innerHTML=inner;e.target.closest('.fg').after(div);div.querySelectorAll('[data-ta]').forEach(function(el){el.addEventListener('click',function(){var tname=decodeURIComponent(el.dataset.ta);var tvid=decodeURIComponent(el.dataset.taVid||'');S.editingAction.name=tname;S.editingAction.videoUrl=tvid;S.editingAction._vidAutoFill=!!tvid;S.showVidOpts=false;render();});});}
  });}
  onAll('[data-ta]',function(e){var tname=decodeURIComponent(e.currentTarget.dataset.ta);var tvid=decodeURIComponent(e.currentTarget.dataset.taVid||'');S.editingAction.name=tname;S.editingAction.videoUrl=tvid;S.editingAction._vidAutoFill=!!tvid;S.showVidOpts=false;render();});
  var fieldMap={'act-reps':'reps','act-dur':'duration','act-weight':'weight','act-note':'note'};
  Object.keys(fieldMap).forEach(function(id){var el=document.getElementById(id);if(el)el.addEventListener('input',function(ev){S.editingAction[fieldMap[id]]=ev.target.value;syncActionToSet();});});
  // video handlers
  on('add-vid',function(){S.showVidOpts=true;render();});
  on('vid-insert',function(){S.showVidOpts=false;S.showInsertLink=true;render();});
  on('vid-search',function(){window.open('https://www.youtube.com/results?search_query='+encodeURIComponent(S.editingAction.name||''),'_blank');S.showVidOpts=false;S.showInsertLink=true;render();});
  on('vid-change',function(){S.editingAction.videoUrl='';S.editingAction._vidAutoFill=false;S.showVidOpts=true;render();});
  on('rm-vid',function(){S.editingAction.videoUrl='';S.showVidOpts=false;syncActionToSet();render();});
  on('yt-link-ok',function(){var v=document.getElementById('yt-link-input');var val=v?v.value:'';if(val&&val.indexOf('youtube.com')<0&&val.indexOf('youtu.be')<0){var e2=document.getElementById('yt-link-err');if(e2)e2.style.display='block';return;}S.editingAction.videoUrl=val;S.showInsertLink=false;S.showVidOpts=false;syncActionToSet();render();});
  on('yt-play-btn',function(e){var vid=e.currentTarget.dataset.vid;var container=document.getElementById('yt-embed-container');if(!vid||!container)return;container.innerHTML='<iframe width="100%" height="100%" style="aspect-ratio:16/9;border:none;border-radius:10px;" src="https://www.youtube.com/embed/'+vid+'?autoplay=1&rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>';e.currentTarget.style.display='none';container.style.display='block';});
  // save action
  on('save-act-btn',function(){
    if(!S.editingAction){return;}
    if(S.view!=='actionEdit'){return;}
    var nameEl=document.getElementById('act-name');
    var name=(nameEl?nameEl.value:(S.editingAction.name||'')).trim();
    if(!name){toast('Action name is required.');return;}
    S.editingAction.name=name;
    var fields={'act-reps':'reps','act-dur':'duration','act-weight':'weight','act-note':'note'};
    Object.keys(fields).forEach(function(id){var el=document.getElementById(id);if(el)S.editingAction[fields[id]]=el.value;});
    // update action bank
    var b=null;
    for(var i=0;i<S.actionBank.length;i++){if(S.actionBank[i].name.toLowerCase()===name.toLowerCase()){b=S.actionBank[i];break;}}
    if(b){if(S.editingAction.videoUrl)b.videoUrl=S.editingAction.videoUrl;}
    else S.actionBank.push({name:name,videoUrl:S.editingAction.videoUrl||''});
    var snapBefore=snapshotKey();
    syncActionToSet();
    var hasChanges=snapshotKey()!==lastSavedSnapshot;
    S.editingAction=null;S.showInsertLink=false;S.showVidOpts=false;
    S.view='setEdit';
    if(hasChanges)forceSave();
    render();
  });
  // preview / share
  on('copy-btn',function(){var txt=buildPreview(S.currentDayId);if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast('Copied!');}).catch(function(){toast('Use the text box below');});else toast('Use the text box below');});
  on('share-btn',function(){var txt=buildPreview(S.currentDayId);if(navigator.share)navigator.share({text:txt}).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast('Copied!');});});
  on('qr-btn',function(){S.view='qr';render();setTimeout(function(){renderQRCode(buildPreview(S.currentDayId),'qr-container');},100);});
  on('qr-share-btn',function(){var txt=buildPreview(S.currentDayId);if(navigator.share)navigator.share({text:txt}).catch(function(){});else if(navigator.clipboard)navigator.clipboard.writeText(txt).then(function(){toast('Copied!');});});
  if(S.view==='qr'&&document.getElementById('qr-container'))setTimeout(function(){renderQRCode(buildPreview(S.currentDayId),'qr-container');},50);
  // import
  on('import-day-btn',function(){S.importView='choose';S.importText='';S.importParsed=null;S.importError='';S.importImageSrc=null;S.view='import';render();});
  on('import-cancel',function(){stopScanner();S.importImageSrc=null;S.view='days';render();});
  on('imp-back-choose',function(){stopScanner();if(S.importImageSrc)URL.revokeObjectURL(S.importImageSrc);S.importImageSrc=null;S.importView='choose';S.importError='';render();});
  on('imp-back-input',function(){S.importView=S.importText?'paste':'choose';render();});
  on('imp-scan',function(){S.importView='scan';S.importImageSrc=null;S.importError='';render();});
  on('imp-scan-camera',function(){S.importError='';render();setTimeout(startScanner,100);});
  on('imp-paste',function(){S.importView='paste';S.importError='';render();});
  on('imp-preview-btn',function(){var ta=document.getElementById('imp-textarea');var txt=ta?ta.value:'';S.importText=txt;var parsed=parseImportText(txt);if(!parsed){S.importError="Couldn't read this format. Make sure it was exported from Training+.";render();return;}S.importParsed=parsed;S.importError='';S.importView='preview';render();});
  on('imp-confirm-btn',function(){var p=S.importParsed;if(!p)return;var days=S.currentData&&S.currentData.days?S.currentData.days:[];var existing=null;for(var i=0;i<days.length;i++){if(days[i].id===p.dayId&&!days[i].deleted){existing=days[i];break;}}if(existing){S.showConfirm={type:'import-conflict',dayId:p.dayId,nextId:maxDayId()+1};render();}else doImport(p.dayId,false);});
  on('imp-replace',function(){var p=S.importParsed;S.showConfirm=null;if(p)doImport(p.dayId,true);});
  on('imp-as-new',function(){var p=S.importParsed;var nid=S.showConfirm?S.showConfirm.nextId:maxDayId()+1;S.showConfirm=null;if(p)doImport(nid,false);});
  on('imp-decode-btn',function(){decodeQRFromImage();});
  on('imp-upload-file',function(){var fi=document.getElementById('qr-file-input');if(fi){fi.value='';fi.click();}});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',function(){
  waitFor(function(){return typeof gapi!=='undefined';},initGapi);
  waitFor(function(){return typeof google!=='undefined'&&!!google.accounts;},initGis);
  setupFileInput();
  S.view='auth';render();
});
</script>
</body>
</html>
