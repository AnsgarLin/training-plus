<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Training+</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efea;
  --txt:#1a1a1a;--txt2:#666;--txt3:#aaa;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --info-bg:#e8f0fe;--info-txt:#1a56db;
  --danger-bg:#fde8e8;--danger-txt:#c81e1e;
  --success-bg:#e3fae8;--success-txt:#057a55;
  --warn-bg:#fdf6e3;--warn-txt:#92400e;
  --radius:10px;--radius-lg:14px;--yt:#FF0000;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg2);color:var(--txt);font-size:15px;min-height:100vh;}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);display:flex;flex-direction:column;position:relative;overflow:hidden;}
.view{flex:1;display:flex;flex-direction:column;min-height:100vh;}
.topbar{height:52px;background:var(--bg);border-bottom:0.5px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:8px;flex-shrink:0;z-index:10;}
.topbar-back{font-size:14px;color:var(--txt2);cursor:pointer;padding:4px 0;white-space:nowrap;}
.topbar-title{flex:1;font-size:16px;font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.topbar-right{font-size:13px;color:var(--info-txt);cursor:pointer;white-space:nowrap;}
.crumb{font-size:10px;color:var(--txt3);background:var(--bg2);padding:4px 14px;border-bottom:0.5px solid var(--border);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tabs{display:flex;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:10px 0;font-size:13px;text-align:center;color:var(--txt2);cursor:pointer;}
.tab.on{color:var(--txt);font-weight:600;border-bottom:2.5px solid var(--txt);}
.sort-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;background:var(--bg2);border-bottom:0.5px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.sort-label{font-size:11px;color:var(--txt2);}
.sort-pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--border2);color:var(--txt2);background:var(--bg);cursor:pointer;}
.sort-pill.on{background:var(--txt);color:var(--bg);border-color:var(--txt);}
.scroll-body{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:13px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.15s;}
.card:active{background:var(--bg2);}
.card-av{width:36px;height:36px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--info-txt);flex-shrink:0;}
.card-body{flex:1;min-width:0;}
.card-title{font-size:14px;font-weight:600;color:var(--txt);}
.card-sub{font-size:11px;color:var(--txt2);margin-top:2px;}
.card-chev{font-size:16px;color:var(--txt3);}
.drag-handle{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding:4px 2px;}
.drag-dot{width:14px;height:1.5px;background:var(--border2);border-radius:1px;}
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius-lg);}
.swipe-del{display:none;}
.deleted-list .swipe-del{position:absolute;right:0;top:0;bottom:0;width:80px;background:var(--danger-bg);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--danger-txt);cursor:pointer;border-radius:0 var(--radius-lg) var(--radius-lg) 0;}
.swipe-inner{transition:transform 0.2s;touch-action:pan-y;}
/* INLINE ADD ROW */
.add-inline{height:46px;border:0.5px dashed var(--border2);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg2);}
.add-inline:active{background:var(--bg3);}
.add-inline-icon{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--txt3);}
.add-inline-label{font-size:13px;color:var(--txt3);}
/* SHARE ROW */
.share-inline{height:46px;border:0.5px solid var(--border2);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg);}
.share-inline:active{background:var(--bg2);}
.share-inline-label{font-size:13px;font-weight:500;color:var(--txt);}
/* EMPTY */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:40px 20px;min-height:200px;}
.empty-ring{width:52px;height:52px;border-radius:50%;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--txt3);}
.empty-txt{font-size:13px;color:var(--txt3);text-align:center;line-height:1.6;}
.chip{font-size:10px;padding:2px 8px;border-radius:20px;}
.chip-save{background:var(--success-bg);color:var(--success-txt);}
.chip-saving{background:var(--warn-bg);color:var(--warn-txt);}
.chip-err{background:var(--danger-bg);color:var(--danger-txt);}
.form-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px;padding-bottom:20px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fl{font-size:11px;color:var(--txt2);}
.fi{width:100%;height:38px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg);padding:0 10px;font-size:14px;color:var(--txt);outline:none;}
.fi:focus{border-color:var(--txt);}
.frow{display:flex;gap:8px;}
.frow .fg{flex:1;}
.ta-drop{border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);overflow:hidden;margin-top:-8px;}
.ta-item{padding:9px 10px;font-size:13px;color:var(--txt2);border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ta-item:last-child{border-bottom:none;}
.ta-item:active{background:var(--bg3);}
.sec-label{font-size:11px;font-weight:600;color:var(--txt2);margin-top:4px;}
.action-list-box{border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.al-row{display:flex;align-items:center;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--border);background:var(--bg);}
.al-row:last-child{border-bottom:none;}
.al-info{flex:1;min-width:0;}
.al-name{font-size:13px;font-weight:600;}
.al-det{font-size:11px;color:var(--txt2);margin-top:1px;}
.al-rm{font-size:18px;color:var(--txt3);cursor:pointer;padding:0 4px;}
.add-action-btn{height:36px;border:0.5px dashed var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--txt3);cursor:pointer;background:var(--bg2);}
.save-btn{height:46px;border-radius:10px;background:var(--txt);color:var(--bg);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.yt-preview-wrap{width:100%;border-radius:10px;overflow:hidden;background:#000;}
.yt-preview-thumb{position:relative;width:100%;aspect-ratio:16/9;cursor:pointer;border-radius:10px;overflow:hidden;}
.yt-preview-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.25);}
.yt-preview-play-btn{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;}
.yt-preview-triangle{width:0;height:0;border-top:12px solid transparent;border-bottom:12px solid transparent;border-left:20px solid #fff;margin-left:4px;}height:42px;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;background:var(--bg2);}
.vid-plus{width:18px;height:18px;border-radius:50%;border:1px solid var(--border2);display:inline-flex;align-items:center;justify-content:center;font-size:12px;color:var(--txt3);flex-shrink:0;}
.vid-opts{border:0.5px solid var(--border);border-radius:10px;overflow:hidden;}
.vid-opt{display:flex;align-items:center;gap:10px;padding:12px;border-bottom:0.5px solid var(--border);cursor:pointer;background:var(--bg);}
.vid-opt:last-child{border-bottom:none;}
.vid-opt:active{background:var(--bg2);}
.vid-opt-icon{width:28px;height:28px;border-radius:7px;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.vid-opt-t{font-size:13px;font-weight:500;}
.vid-opt-s{font-size:10px;color:var(--txt2);}
.vid-attached{display:flex;align-items:center;gap:8px;border:0.5px solid var(--border);border-radius:8px;padding:8px 10px;background:var(--bg2);cursor:pointer;}
.vid-url{font-size:11px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vid-rm{font-size:11px;color:var(--danger-txt);cursor:pointer;white-space:nowrap;}
.vid-autofill{background:var(--info-bg);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;}
.vid-af-txt{flex:1;font-size:11px;color:var(--info-txt);}
.vid-af-chg{font-size:11px;color:var(--txt2);cursor:pointer;}
.overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;flex-direction:column;justify-content:flex-end;z-index:50;}
.sheet{background:var(--bg);border-radius:14px 14px 0 0;display:flex;flex-direction:column;overflow:hidden;}
.sheet-bar{height:48px;display:flex;align-items:center;padding:0 14px;border-bottom:0.5px solid var(--border);flex-shrink:0;gap:8px;}
.sheet-title{font-size:15px;font-weight:600;flex:1;}
.sheet-close{font-size:13px;color:var(--txt2);cursor:pointer;padding:4px 0;}
.yt-search-row{display:flex;gap:8px;padding:10px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.yt-inp{flex:1;height:34px;border:0.5px solid var(--border2);border-radius:8px;background:var(--bg2);padding:0 10px;font-size:13px;color:var(--txt);outline:none;}
.yt-go{height:34px;padding:0 14px;border-radius:8px;background:var(--yt);font-size:13px;color:#fff;display:flex;align-items:center;cursor:pointer;white-space:nowrap;border:none;font-weight:600;}
.yt-results{flex:1;overflow-y:auto;}
.yt-row{display:flex;gap:10px;padding:10px 12px;border-bottom:0.5px solid var(--border);align-items:flex-start;cursor:pointer;}
.yt-row:active{background:var(--bg2);}
.yt-thumb{width:64px;height:42px;background:#1a1a1a;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.yt-thumb img{width:100%;height:100%;object-fit:cover;}
.yt-play{width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-left:14px solid rgba(255,255,255,0.85);margin-left:2px;}
.yt-info{flex:1;min-width:0;}
.yt-title{font-size:12px;font-weight:600;color:var(--txt);line-height:1.3;margin-bottom:3px;}
.yt-ch{font-size:10px;color:var(--txt3);}
.yt-use{font-size:12px;color:var(--info-txt);flex-shrink:0;padding-top:2px;font-weight:600;cursor:pointer;}
.prev-block{background:var(--bg2);border-radius:10px;padding:14px;font-size:12px;line-height:1.9;font-family:"SF Mono","Fira Mono",monospace;}
.prev-set{color:var(--txt);font-weight:600;}
.prev-act{color:var(--txt2);padding-left:14px;}
.prev-actions{display:flex;gap:8px;margin-top:10px;}
.prev-btn{flex:1;height:44px;border:0.5px solid var(--border2);border-radius:10px;font-size:13px;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;font-weight:500;background:var(--bg);}
.prev-btn:active{background:var(--bg2);}
.sel-box{background:var(--bg2);border-radius:8px;padding:10px;margin-top:8px;}
.sel-hint{font-size:10px;color:var(--txt2);margin-bottom:6px;}
.sel-text{font-size:10px;color:var(--txt);font-family:"SF Mono","Fira Mono",monospace;border:0.5px solid var(--border);border-radius:6px;padding:8px;line-height:1.8;width:100%;resize:none;background:var(--bg);outline:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;z-index:200;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity 0.25s;}
.toast.show{opacity:1;}
.confirm-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.4);display:flex;align-items:flex-end;z-index:60;}
.confirm-box{background:var(--bg);border-radius:14px 14px 0 0;padding:20px 16px 28px;width:100%;}
.confirm-title{font-size:16px;font-weight:600;margin-bottom:6px;}
.confirm-sub{font-size:13px;color:var(--txt2);margin-bottom:18px;line-height:1.5;}
.confirm-btns{display:flex;gap:10px;}
.confirm-cancel{flex:1;height:44px;border:0.5px solid var(--border2);border-radius:10px;font-size:14px;cursor:pointer;background:var(--bg);font-weight:500;}
.confirm-del{flex:1;height:44px;border:none;border-radius:10px;font-size:14px;cursor:pointer;background:var(--danger-bg);color:var(--danger-txt);font-weight:600;}
.auth-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px 24px;}
.auth-logo{width:64px;height:64px;border-radius:16px;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;}
.auth-btn{width:100%;height:48px;border-radius:12px;border:0.5px solid var(--border2);background:var(--bg);font-size:15px;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;font-weight:500;}
.auth-btn.primary{background:var(--txt);color:var(--bg);}
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--txt2);font-size:14px;}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--txt);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.user-pill{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--txt2);cursor:pointer;}
.user-av{width:24px;height:24px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--info-txt);overflow:hidden;}
.user-av img{width:100%;height:100%;object-fit:cover;}
.swipe-hint{font-size:10px;color:var(--txt3);text-align:right;}
</style>
</head>
<body>
<div id="app"><div id="view-root"></div></div>
<div id="toast" class="toast"></div>
<script src="https://accounts.google.com/gsi/client" async></script>
<script src="https://apis.google.com/js/api.js" async></script>
<script>
const CLIENT_ID='304684962808-2uqcl5ktktprgdb1aj1nftgci0pbgqbb.apps.googleusercontent.com';
const SCOPES='https://www.googleapis.com/auth/drive.file';
const FOLDER_NAME='Training+';
const DELETED_FOLDER='deleted';
const BANK_FILE='action_bank.json';
const YT_API_KEY='AIzaSyCmSL5JKt72WfiasPyuVEdV-Y_VvTInBvU';

const S={
  authReady:false,gapiReady:false,gisReady:false,
  user:null,accessToken:null,tokenClient:null,
  rootFolderId:null,deletedFolderId:null,
  studentFiles:[],deletedFiles:[],
  actionBank:[],bankFileId:null,
  currentData:null,currentFileId:null,
  view:'auth',sort:'az',studentTab:'active',
  currentStudentName:null,currentDayId:null,currentSetId:null,
  editingSet:null,editingAction:null,
  showVidOpts:false,showInsertLink:false,
  showYTOverlay:false,ytQuery:'',ytResults:[],
  saveStatus:'saved',syncMsg:'',
  showConfirm:null,errorBanner:'',
};

// ── UTILS ─────────────────────────────────────────────────────────────────────
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
function avatarColors(n){const c=[['#e8f0fe','#1a56db'],['#e3fae8','#057a55'],['#fdf6e3','#92400e'],['#f3e8ff','#6b21a8'],['#fce7f3','#9d174d']];let h=0;for(const ch of n)h+=ch.charCodeAt(0);return c[h%c.length];}
function initials(n){return n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}
function ytIcon(w=22,h=15){return `<svg width="${w}" height="${h}" viewBox="0 0 20 14"><rect width="20" height="14" rx="3" fill="#FF0000"/><polygon points="8,3 8,11 15,7" fill="white"/></svg>`;}
function ytVideoId(url){
  if(!url)return null;
  const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([a-zA-Z0-9_-]{11})/);
  return m?m[1]:null;
}
function shortUrl(u){return(u||'').replace(/https?:\/\//,'');}
function chipHtml(){
  if(S.saveStatus==='saving')return`<span class="chip chip-saving">Saving…</span>`;
  if(S.saveStatus==='error')return`<span class="chip chip-err" id="retry-save">⚠ Retry</span>`;
  return`<span class="chip chip-save">Saved ✓</span>`;
}
function userPillHtml(){
  if(!S.user)return'';
  const av=S.user.picture?`<div class="user-av"><img src="${S.user.picture}"/></div>`:`<div class="user-av">${initials(S.user.name||'U')}</div>`;
  return`<div class="user-pill" id="sign-out-btn">${av}<span>${(S.user.name||'').split(' ')[0]}</span></div>`;
}
function saveStatus(s){S.saveStatus=s;render();}

// ── GAPI ──────────────────────────────────────────────────────────────────────
function waitFor(check,cb){if(check())cb();else setTimeout(()=>waitFor(check,cb),200);}
function initGapi(){gapi.load('client',async()=>{await gapi.client.init({discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});S.gapiReady=true;checkReady();});}
function initGis(){S.tokenClient=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async r=>{if(r.error){S.errorBanner='Sign-in failed: '+r.error;render();return;}S.accessToken=r.access_token;gapi.client.setToken({access_token:r.access_token});await loadUserInfo();await bootstrap();}});S.gisReady=true;checkReady();}
function checkReady(){if(S.gapiReady&&S.gisReady){S.authReady=true;render();}}
async function loadUserInfo(){try{const r=await gapi.client.request({path:'https://www.googleapis.com/oauth2/v2/userinfo'});S.user=r.result;}catch{S.user={name:'User',email:'',picture:''};}}
function signIn(){if(S.tokenClient)S.tokenClient.requestAccessToken({prompt:''});}
function signOut(){
  stopSyncInterval();
  if(S.accessToken)google.accounts.oauth2.revoke(S.accessToken);
  S.accessToken=null;S.user=null;S.currentData=null;
  S.rootFolderId=null;S.studentFiles=[];
  lastSavedSnapshot=null;
  S.view='auth';render();
}

// ── DRIVE ─────────────────────────────────────────────────────────────────────
async function driveList(q){const r=await gapi.client.drive.files.list({q,fields:'files(id,name,modifiedTime)',spaces:'drive',pageSize:200});return r.result.files||[];}
async function driveCreateFolder(name,parentId){const r=await gapi.client.drive.files.create({resource:{name,mimeType:'application/vnd.google-apps.folder',parents:parentId?[parentId]:[]},fields:'id'});return r.result.id;}
async function driveRead(fileId){const r=await gapi.client.request({path:`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`});return typeof r.result==='string'?JSON.parse(r.result):r.result;}
async function driveWrite(fileId,data){
  const body=JSON.stringify(data);
  const resp=await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,{method:'PATCH',headers:{'Authorization':`Bearer ${S.accessToken}`,'Content-Type':'application/json; charset=UTF-8'},body});
  if(!resp.ok){const e=await resp.text();throw new Error(`Drive write ${resp.status}: ${e}`);}
}
async function driveCreate(name,parentId,data){const m=await gapi.client.drive.files.create({resource:{name,mimeType:'application/json',parents:[parentId]},fields:'id'});const id=m.result.id;await driveWrite(id,data);return id;}
async function driveMove(fileId,from,to){await gapi.client.drive.files.update({fileId,addParents:to,removeParents:from,fields:'id'});}
async function driveDelete(fileId){await gapi.client.drive.files.delete({fileId});}

// ── SYNC ─────────────────────────────────────────────────────────────────────
let lastSavedSnapshot=null;
let syncInterval=null;

function snapshotKey(){
  return JSON.stringify({data:S.currentData,bank:S.actionBank});
}

function startSyncInterval(){
  stopSyncInterval();
  syncInterval=setInterval(async()=>{
    if(!S.currentFileId||!S.currentData)return;
    const current=snapshotKey();
    if(current===lastSavedSnapshot)return;
    await forceSave();
  },500);
}

function stopSyncInterval(){
  if(syncInterval){clearInterval(syncInterval);syncInterval=null;}
}

async function forceSave(){
  if(!S.currentFileId||!S.currentData)return;
  const snap=JSON.parse(JSON.stringify(S.currentData));
  const bank=JSON.parse(JSON.stringify(S.actionBank));
  const key=snapshotKey();
  S.saveStatus='saving';updateChip();
  try{
    await driveWrite(S.currentFileId,snap);
    await driveWrite(S.bankFileId,bank);
    lastSavedSnapshot=key;
    S.saveStatus='saved';updateChip();
  }catch(e){

// ── BOOTSTRAP ─────────────────────────────────────────────────────────────────
async function bootstrap(){
  S.view='loading';S.syncMsg='Setting up Training+…';render();
  try{
    let f=await driveList(`name='${FOLDER_NAME}' and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    S.rootFolderId=f.length>0?f[0].id:await driveCreateFolder(FOLDER_NAME);
    let df=await driveList(`name='${DELETED_FOLDER}' and '${S.rootFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`);
    S.deletedFolderId=df.length>0?df[0].id:await driveCreateFolder(DELETED_FOLDER,S.rootFolderId);
    let bf=await driveList(`name='${BANK_FILE}' and '${S.rootFolderId}' in parents and trashed=false`);
    if(bf.length>0){S.bankFileId=bf[0].id;S.actionBank=await driveRead(S.bankFileId);}
    else{S.actionBank=[];S.bankFileId=await driveCreate(BANK_FILE,S.rootFolderId,[]);}
    await refreshStudentList();
    S.view='students';render();
  }catch(e){S.errorBanner='Setup failed: '+e.message;S.view='auth';render();}
}
async function refreshStudentList(){
  const f=await driveList(`'${S.rootFolderId}' in parents and mimeType='application/json' and name!='${BANK_FILE}' and trashed=false`);
  S.studentFiles=f.map(x=>({name:x.name.replace('.json',''),fileId:x.id,lastModified:x.modifiedTime}));

async function refreshDeletedList(){

async function loadStudent(fileId,name){

// ── COMMIT SET ────────────────────────────────────────────────────────────────
function commitSet(){
  if(!S.editingSet||!S.currentData)return;
  if(!S.currentData.days)S.currentData.days=[];
  let day=S.currentData.days.find(d=>d.id===S.currentDayId);
  if(!day){day={id:S.currentDayId,deleted:false,sets:[]};S.currentData.days.push(day);}
  if(!day.sets)day.sets=[];
  const toSave=JSON.parse(JSON.stringify(S.editingSet));
  if(toSave.id){
    const idx=day.sets.findIndex(s=>s.id===toSave.id);
    if(idx>=0)day.sets[idx]=toSave;else day.sets.push(toSave);
  }else{
    toSave.id=day.sets.reduce((m,s)=>Math.max(m,s.id||0),0)+1;
    S.editingSet.id=toSave.id; // keep draft in sync
    day.sets.push(toSave);
  }
  autoSave();
}


function updateChip(){
  const el=document.querySelector('.chip');
  if(!el)return;
  if(S.saveStatus==='saving'){el.className='chip chip-saving';el.textContent='Saving…';}
  else if(S.saveStatus==='error'){el.className='chip chip-err';el.id='retry-save';el.textContent='⚠ Retry';}
  else{el.className='chip chip-save';el.textContent='Saved ✓';}
}

function autoSave(){}

// ── DATA ──────────────────────────────────────────────────────────────────────
function getDays(){return(S.currentData?.days||[]).filter(d=>!d.deleted).sort((a,b)=>a.id-b.id);}
function getSets(did){return((S.currentData?.days||[]).find(d=>d.id===did)?.sets||[]).filter(s=>!s.deleted);}
function maxDayId(){return(S.currentData?.days||[]).reduce((m,d)=>Math.max(m,d.id),0);}
function buildPreview(dayId){
  const day=(S.currentData?.days||[]).find(d=>d.id===dayId);
  if(!day)return'';
  let lines=[`D${day.id}`];
  for(const set of(day.sets||[]).filter(s=>!s.deleted)){
    let sl=`${set.rounds} Set${set.rounds>1?'s':''}`;
    if(set.rest)sl+=` | rest ${set.rest} min`;
    if(set.note)sl+=` | ${set.note}`;
    lines.push(sl);
    for(const a of(set.actions||[]).filter(a=>!a.deleted)){
      let al=`  ${a.name}`;
      if(a.reps)al+=` | ${a.reps} Reps`;
      if(a.duration)al+=` | ${a.duration}`;
      if(a.weight)al+=` | ${a.weight}`;
      if(a.note)al+=` | ${a.note}`;
      if(a.videoUrl)al+=` | ${shortUrl(a.videoUrl)}`;
      lines.push(al);
    }
    lines.push('');
  }
  return lines.join('\n').trim();
}

// ── YT SEARCH ─────────────────────────────────────────────────────────────────
async function ytSearch(q){
  if(!q)return;
  if(YT_API_KEY){
    try{
      const r=await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(q)}&type=video&maxResults=5&key=${YT_API_KEY}`);
      const d=await r.json();
      S.ytResults=(d.items||[]).map(i=>({title:i.snippet.title,channel:i.snippet.channelTitle,thumb:i.snippet.thumbnails.default.url,url:`https://youtu.be/${i.id.videoId}`}));
      render();return;
    }catch{}
  }
  window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,'_blank');
  toast('Paste the YouTube link manually');
  S.showYTOverlay=false;S.showVidOpts=false;S.showInsertLink=true;render();
}

        <div class="fg"><div class="fl">Weight</div><input class="fi" id="act-weight" value="${draft.weight||''}" placeholder="—"/></div>
        <div class="fg" style="flex:2"><div class="fl">Note</div><input class="fi" id="act-note" value="${draft.note||''}" placeholder="optional"/></div>
      </div>
      ${vidHtml}
      <div class="save-btn" id="save-act-btn">Save action</div>
    </div>
    ${S.showYTOverlay?renderYTOverlay():''}
  </div>`;
}

function renderYTOverlay(){
  const rows=S.ytResults.map(r=>`<div class="yt-row">
    <div class="yt-thumb">${r.thumb?`<img src="${r.thumb}"/>`:`<div class="yt-play"></div>`}</div>
    <div class="yt-info"><div class="yt-title">${r.title}</div><div class="yt-ch">${r.channel}</div></div>
    <div class="yt-use" data-yt-url="${r.url}">Use</div>
  </div>`).join('');
  return`<div class="overlay" id="yt-overlay">
    <div class="sheet" style="height:90%">
      <div class="sheet-bar"><div class="sheet-title">Search YouTube</div><div class="sheet-close" id="yt-close">Cancel</div></div>
      <div class="yt-search-row">
        <input class="yt-inp" id="yt-q" value="${S.ytQuery}" placeholder="Search…"/>
        <button class="yt-go" id="yt-go-btn">Search</button>
      </div>
      <div class="yt-results">${rows||`<div style="padding:24px;text-align:center;color:var(--txt3);font-size:13px">Enter a search term and tap Search<br/><br/><span style="font-size:11px">Add YouTube API key for live results</span></div>`}</div>
    </div>
  </div>`;
}

function renderPreview(){
  const txt=buildPreview(S.currentDayId);
  const lines=txt.split('\n').map(l=>{
    if(l.startsWith('  '))return`<div class="prev-act">${l.trim()}</div>`;
    if(!l)return`<div style="height:6px"></div>`;
    return`<div class="prev-set">${l}</div>`;
  }).join('');
  return`<div class="view">
    <div class="topbar">
      <div class="topbar-back" id="back-sets-prev">‹ D${S.currentDayId}</div>
      <div class="topbar-title">Preview</div>
    </div>
    <div class="crumb">${S.currentStudentName} / D${S.currentDayId} / Preview</div>
    <div class="scroll-body">
      <div class="prev-block">${lines}</div>
      <div class="prev-actions">
        <div class="prev-btn" id="copy-btn">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.3"/><path d="M3 11V3h8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> Copy
        </div>
        <div class="prev-btn" id="share-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="3" y="8" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M12 2v11M9 5l3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg> Share
        </div>
      </div>
      <div class="sel-box">
        <div class="sel-hint">If copy is blocked — select manually:</div>
        <textarea class="sel-text" rows="6" readonly>${txt}</textarea>
      </div>
    </div>
  </div>`;
}

function renderConfirm(){
  const c=S.showConfirm;
  return`<div class="confirm-overlay" id="conf-bg">
    <div class="confirm-box">
      <div class="confirm-title">Delete permanently?</div>
      <div class="confirm-sub">${c.name} and all their data will be removed from Google Drive forever.</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" id="conf-cancel">Cancel</button>
        <button class="confirm-del" id="conf-ok">Delete forever</button>
      </div>
    </div>
  </div>`;
}

// ── SWIPE ─────────────────────────────────────────────────────────────────────
function setupSwipe(el){
  const inner=el.querySelector('.swipe-inner');
  if(!inner)return;
  let sx=0,dx=0;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;dx=0;},{passive:true});
  el.addEventListener('touchmove',e=>{dx=e.touches[0].clientX-sx;if(dx<0){inner.style.transition='none';inner.style.transform=`translateX(${Math.max(dx,-80)}px)`;}},{passive:true});
  el.addEventListener('touchend',()=>{inner.style.transition='transform 0.2s';inner.style.transform=dx<-40?'translateX(-80px)':'translateX(0)';});
}

// ── HANDLERS ──────────────────────────────────────────────────────────────────
function attachHandlers(){
  document.getElementById('signin-btn')?.addEventListener('click',signIn);
  document.getElementById('sign-out-btn')?.addEventListener('click',()=>{if(confirm('Sign out?'))signOut();});
  document.getElementById('retry-save')?.addEventListener('click',autoSave);

  document.querySelectorAll('[data-sort]').forEach(el=>el.addEventListener('click',()=>{S.sort=el.dataset.sort;render();}));
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',async()=>{
    S.studentTab=el.dataset.tab;
    if(el.dataset.tab==='deleted'&&S.deletedFiles.length===0){
      await refreshDeletedList();
    }
    render();
  }));

  // navigate
  document.querySelectorAll('[data-load-student]').forEach(el=>el.addEventListener('click',()=>loadStudent(el.dataset.loadStudent,el.dataset.sname)));
  document.querySelectorAll('[data-nav-day]').forEach(el=>el.addEventListener('click',()=>{S.currentDayId=parseInt(el.dataset.navDay);S.view='sets';render();}));
  document.querySelectorAll('[data-nav-set]').forEach(el=>el.addEventListener('click',()=>{
    const sid=parseInt(el.dataset.navSet);
    const set=getSets(S.currentDayId).find(s=>s.id===sid);
    if(!set)return;
    S.currentSetId=sid;S.editingSet=JSON.parse(JSON.stringify(set));S.view='setEdit';render();
  }));

  // back
  document.getElementById('back-students')?.addEventListener('click',async()=>{S.view='loading';S.syncMsg='Syncing…';render();await refreshStudentList();S.view='students';render();});
  document.getElementById('back-days')?.addEventListener('click',()=>{S.view='days';render();});
  document.getElementById('back-sets')?.addEventListener('click',()=>{S.editingSet=null;S.view='sets';render();});
  document.getElementById('back-set-edit')?.addEventListener('click',()=>{S.editingAction=null;S.showInsertLink=false;S.showVidOpts=false;S.view='setEdit';render();});
  document.getElementById('back-sets-prev')?.addEventListener('click',()=>{S.view='sets';render();});

  // inline add buttons
  document.getElementById('add-student-btn')?.addEventListener('click',async()=>{
    const n=(prompt('Student name:','')||'').trim();
    if(!n)return;
    let name=n;
    while(S.studentFiles.find(s=>s.name.toLowerCase()===name.toLowerCase())){
      const m=name.match(/ (\d+)$/);name=m?name.replace(/ \d+$/,' '+(parseInt(m[1])+1)):name+' 2';
    }
    S.view='loading';S.syncMsg='Creating student…';render();
    const fid=await driveCreate(name+'.json',S.rootFolderId,{name,days:[]});
    S.currentData={name,days:[]};S.currentFileId=fid;S.currentStudentName=name;
    await refreshStudentList();S.view='days';render();
  });
  document.getElementById('add-day-btn')?.addEventListener('click',()=>{
    if(!S.currentData.days)S.currentData.days=[];
    const nid=maxDayId()+1;
    S.currentData.days.push({id:nid,deleted:false,sets:[]});
    S.currentDayId=nid;S.view='sets';render();autoSave();
  });
  document.getElementById('add-set-btn')?.addEventListener('click',()=>{
    S.editingSet={id:null,rounds:1,rest:'',note:'',actions:[],deleted:false};
    S.view='setEdit';render();
  });
  document.getElementById('share-day-btn')?.addEventListener('click',()=>{S.view='preview';render();});

  // delete student → move to deleted folder
  document.querySelectorAll('[data-del-student]').forEach(el=>el.addEventListener('click',async()=>{
    S.view='loading';S.syncMsg='Moving to deleted…';render();
    try{await driveMove(el.dataset.delStudent,S.rootFolderId,S.deletedFolderId);await refreshStudentList();}
    catch(e){toast('Error: '+e.message);}
    S.view='students';render();
  }));
  document.querySelectorAll('[data-perm-del]').forEach(el=>el.addEventListener('click',()=>{S.showConfirm={fileId:el.dataset.permDel,name:el.dataset.name};render();}));
  document.getElementById('conf-cancel')?.addEventListener('click',()=>{S.showConfirm=null;render();});
  document.getElementById('conf-ok')?.addEventListener('click',async()=>{
    const fid=S.showConfirm.fileId;S.showConfirm=null;
    S.view='loading';S.syncMsg='Deleting…';render();
    try{await driveDelete(fid);await refreshDeletedList();}catch(e){toast('Error: '+e.message);}
    S.view='students';S.studentTab='deleted';render();
  });
  document.getElementById('conf-bg')?.addEventListener('click',e=>{if(e.target.id==='conf-bg'){S.showConfirm=null;render();}});
  document.querySelectorAll('[data-restore]').forEach(el=>el.addEventListener('click',async()=>{
    S.view='loading';S.syncMsg='Restoring…';render();
    try{await driveMove(el.dataset.restore,S.deletedFolderId,S.rootFolderId);await refreshDeletedList();await refreshStudentList();}
    catch(e){toast('Error: '+e.message);}
    S.view='students';S.studentTab='active';render();
  }));

  // delete day / set
  document.querySelectorAll('[data-del-day]').forEach(el=>el.addEventListener('click',()=>{
    const day=(S.currentData?.days||[]).find(d=>d.id===parseInt(el.dataset.delDay));
    if(day){day.deleted=true;render();autoSave();}
  }));
  document.querySelectorAll('[data-del-set]').forEach(el=>el.addEventListener('click',()=>{
    const day=(S.currentData?.days||[]).find(d=>d.id===S.currentDayId);
    const set=(day?.sets||[]).find(s=>s.id===parseInt(el.dataset.delSet));
    if(set){set.deleted=true;render();autoSave();}
  }));

  // set edit
  // tap action row → edit action
  document.querySelectorAll('[data-edit-act]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('[data-rm-act]'))return; // let ✕ handle its own click
    const id=parseInt(el.dataset.editAct);
    const a=S.editingSet.actions.find(a=>a.id===id);
    if(!a)return;
    S.editingAction=JSON.parse(JSON.stringify(a));
    S.editingAction._vidAutoFill=false;
    S.showVidOpts=false;S.showInsertLink=false;
    S.view='actionEdit';render();
  }));
  document.querySelectorAll('[data-rm-act]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const a=(S.editingSet?.actions||[]).find(a=>a.id===parseInt(el.dataset.rmAct));
    if(a){a.deleted=true;commitSet();render();}
  }));
  document.getElementById('add-action-btn')?.addEventListener('click',()=>{
    S.editingAction={id:null,name:'Action 1',reps:'',duration:'',weight:'',note:'',videoUrl:'',deleted:false};
    S.showVidOpts=false;S.showInsertLink=false;S.view='actionEdit';render();
  });
  // set edit — autosave on any field change
  const syncSetFields=()=>{
    if(!S.editingSet)return;
    S.editingSet.rounds=parseInt(document.getElementById('set-rounds')?.value)||1;
    S.editingSet.rest=document.getElementById('set-rest')?.value||'';
    S.editingSet.note=document.getElementById('set-note')?.value||'';
    commitSet();
  };  document.getElementById('set-rounds')?.addEventListener('change',syncSetFields);
  document.getElementById('set-rest')?.addEventListener('change',syncSetFields);
  document.getElementById('set-note')?.addEventListener('change',syncSetFields);

  // action edit — name field with surgical typeahead update (no full re-render)
  document.getElementById('act-name')?.addEventListener('input',e=>{
    S.editingAction.name=e.target.value;
    S.editingAction._vidAutoFill=false;
    const q=e.target.value.toLowerCase();
    const matches=q.length>0?S.actionBank.filter(a=>a.name.toLowerCase().includes(q)).slice(0,5):[];
    const existing=document.getElementById('ta-drop');
    if(existing)existing.remove();
    if(matches.length>0){
      const div=document.createElement('div');
      div.className='ta-drop';div.id='ta-drop';
      div.innerHTML=matches.map(m=>`<div class="ta-item" data-ta="${encodeURIComponent(m.name)}" data-ta-vid="${encodeURIComponent(m.videoUrl||'')}"><span>${m.name}</span>${m.videoUrl?ytIcon(20,14):''}</div>`).join('');
      e.target.closest('.fg').after(div);
      div.querySelectorAll('[data-ta]').forEach(el=>el.addEventListener('click',()=>{
        const name=decodeURIComponent(el.dataset.ta);
        const vid=decodeURIComponent(el.dataset.taVid||'');
        S.editingAction.name=name;S.editingAction.videoUrl=vid;
        S.editingAction._vidAutoFill=!!vid;S.showVidOpts=false;render();
      }));
    }
  });
  document.querySelectorAll('[data-ta]').forEach(el=>el.addEventListener('click',()=>{
    const name=decodeURIComponent(el.dataset.ta);
    const vid=decodeURIComponent(el.dataset.taVid||'');
    S.editingAction.name=name;S.editingAction.videoUrl=vid;
    S.editingAction._vidAutoFill=!!vid;S.showVidOpts=false;render();
  }));
  ['act-reps','act-dur','act-weight','act-note'].forEach(id=>{
    document.getElementById(id)?.addEventListener('input',e=>{
      const m={'act-reps':'reps','act-dur':'duration','act-weight':'weight','act-note':'note'};
      S.editingAction[m[id]]=e.target.value;
    });
  });
  document.getElementById('add-vid')?.addEventListener('click',()=>{S.showVidOpts=true;render();});
  document.getElementById('vid-insert')?.addEventListener('click',()=>{S.showVidOpts=false;S.showInsertLink=true;render();});
  document.getElementById('vid-search')?.addEventListener('click',async()=>{
    S.showVidOpts=false;S.showYTOverlay=true;S.ytQuery=S.editingAction.name||'';render();
    await ytSearch(S.ytQuery);
  });
  document.getElementById('vid-change')?.addEventListener('click',()=>{S.editingAction.videoUrl='';S.editingAction._vidAutoFill=false;S.showVidOpts=true;render();});
  document.getElementById('yt-play-btn')?.addEventListener('click',e=>{
    const vid=e.currentTarget.dataset.vid;
    const wrap=document.getElementById('yt-preview-wrap');
    const container=document.getElementById('yt-embed-container');
    if(!vid||!wrap||!container)return;
    container.innerHTML=`<iframe width="100%" height="100%" style="aspect-ratio:16/9;border:none;border-radius:10px;" src="https://www.youtube.com/embed/${vid}?autoplay=1&rel=0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe>`;
    e.currentTarget.style.display='none';
    container.style.display='block';
  });
  document.getElementById('rm-vid')?.addEventListener('click',()=>{S.editingAction.videoUrl='';S.showVidOpts=false;render();});
  document.getElementById('yt-link-ok')?.addEventListener('click',()=>{
    const v=document.getElementById('yt-link-input')?.value||'';
    if(v&&!v.includes('youtube.com')&&!v.includes('youtu.be')){document.getElementById('yt-link-err').style.display='block';return;}
    S.editingAction.videoUrl=v;S.showInsertLink=false;S.showVidOpts=false;render();
  });
  document.getElementById('yt-close')?.addEventListener('click',()=>{S.showYTOverlay=false;S.ytResults=[];S.showVidOpts=false;render();});
  document.getElementById('yt-go-btn')?.addEventListener('click',async()=>{S.ytQuery=document.getElementById('yt-q')?.value||'';await ytSearch(S.ytQuery);});
  document.getElementById('yt-q')?.addEventListener('keydown',async e=>{if(e.key==='Enter'){S.ytQuery=e.target.value;await ytSearch(S.ytQuery);}});
  document.querySelectorAll('[data-yt-url]').forEach(el=>el.addEventListener('click',()=>{
    S.editingAction.videoUrl=el.dataset.ytUrl;S.showYTOverlay=false;S.ytResults=[];S.showVidOpts=false;render();
  }));
  document.getElementById('save-act-btn')?.addEventListener('click',async()=>{
    const name=(document.getElementById('act-name')?.value||S.editingAction.name||'').trim();
    if(!name){alert('Action name is required.');return;}
    S.editingAction.name=name;
    S.editingAction.reps=document.getElementById('act-reps')?.value??S.editingAction.reps??'';
    S.editingAction.duration=document.getElementById('act-dur')?.value??S.editingAction.duration??'';
    S.editingAction.weight=document.getElementById('act-weight')?.value??S.editingAction.weight??'';
    S.editingAction.note=document.getElementById('act-note')?.value??S.editingAction.note??'';
    const b=S.actionBank.find(a=>a.name.toLowerCase()===name.toLowerCase());
    if(b){if(S.editingAction.videoUrl)b.videoUrl=S.editingAction.videoUrl;}
    else S.actionBank.push({name,videoUrl:S.editingAction.videoUrl||''});
    if(S.editingAction.id){
      // update existing action in set
      const idx=(S.editingSet.actions||[]).findIndex(a=>a.id===S.editingAction.id);
      if(idx>=0) S.editingSet.actions[idx]=JSON.parse(JSON.stringify(S.editingAction));
    } else {
      const mid=(S.editingSet.actions||[]).reduce((m,a)=>Math.max(m,a.id||0),0);
      S.editingAction.id=mid+1;S.editingAction._vidAutoFill=false;
      S.editingSet.actions.push(JSON.parse(JSON.stringify(S.editingAction)));
    }
    S.editingAction=null;S.showInsertLink=false;S.showVidOpts=false;
    commitSet();
    await forceSave();
    S.view='setEdit';render();
  });

  // preview
  document.getElementById('copy-btn')?.addEventListener('click',()=>{
    const txt=buildPreview(S.currentDayId);
    navigator.clipboard?.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast('Use the text box below'));
  });
  document.getElementById('share-btn')?.addEventListener('click',()=>{
    const txt=buildPreview(S.currentDayId);
    if(navigator.share)navigator.share({text:txt}).catch(()=>{});
    else navigator.clipboard?.writeText(txt).then(()=>toast('Copied!')).catch(()=>toast('Use the text box below'));
  });
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  waitFor(()=>typeof gapi!=='undefined',()=>initGapi());
  waitFor(()=>typeof google!=='undefined'&&!!google.accounts,()=>initGis());
  render();
});
</script>
</body>
</html>
